{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container mt-5">
  <h2 class="text-center mb-4 neon-title">Reply to {{ msg.name }}</h2>

  <form method="POST" class="w-75 mx-auto">
    {% csrf_token %}
    <div class="mb-3">
      <label for="id_subject" class="form-label">Subject</label>
      {{ form.subject }}
    </div>
    <div class="mb-3">
      <label for="id_message" class="form-label">Message</label>
      {{ form.message }}
    </div>
    <button type="submit" class="btn btn-success">Send Reply</button>
    <a href="{% url 'messages' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>

{% endblock %}
