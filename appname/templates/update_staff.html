{% load static %}
{% block content %}

<!-- Bootstrap + Poppins Font -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: url("{% static 'image/bg.jpg' %}") center/cover no-repeat fixed;
    min-height: 100vh;
    color: white;
  }

  .update-form {
    background-color: rgba(0, 0, 0, 0.8);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0, 255, 150, 0.15);
    max-width: 700px;
    margin: auto;
  }

  .form-label {
    color: #2bf09f;
    font-weight: 600;
  }

  .form-control {
    border-radius: 12px;
  }

  .btn-success {
    background-color: #2bf09f;
    border: none;
    color: black;
    font-weight: 600;
    padding: 10px 30px;
    border-radius: 30px;
  }

  .btn-success:hover {
    background-color: #24e69f;
    color: black;
  }
</style>

<div class="container py-5">
  <div class="update-form">
    <h3 class="text-center text-success mb-4">✏️ Update Staff Profile</h3>
    {% if error_msg %}
      <div class="alert alert-danger text-center">{{ error_msg }}</div>
    {% endif %}
    
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" value="{{ staff.full_name }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" value="{{ staff.email }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Mobile</label>
          <input type="text" name="mobile" value="{{ staff.mobile }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Department</label>
          <input type="text" name="department" value="{{ staff.department }}" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Designation</label>
          <input type="text" name="designation" value="{{ staff.designation }}" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Experience (Years)</label>
          <input type="number" name="experience" value="{{ staff.experience }}" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Qualification</label>
          <input type="text" name="qualification" value="{{ staff.qualification }}" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">LinkedIn Profile</label>
          <input type="url" name="linkedin" value="{{ staff.linkedin }}" class="form-control">
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" required>{{ staff.address }}</textarea>
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label">Profile Image</label>
          {% if staff.profile_image %}
            <img src="{{ staff.profile_image.url }}" class="mb-2" height="80"><br>
          {% endif %}
          <input type="file" name="profile_image" class="form-control">
        </div>
      </div>

      <div class="row justify-content-center mt-4">
        <div class="col-auto">
          <button type="submit" class="btn btn-success px-4">💾 Save Changes</button>
        </div>
        <div class="col-auto">
          <a href="{% url 'staffdashboard' %}" class="btn btn-outline-warning px-4 fw-bold">← Back to Dashboard</a>
        </div>
      </div>
    </form>
  </div>
</div>

{% endblock %}
