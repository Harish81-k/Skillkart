{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #0d0d0d;
    color: white;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .image-side {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("{% static 'image/login.jpg' %}") center/cover no-repeat;
    filter: blur(5px);
    z-index: -1;
  }

  .role-section {
    text-align: center;
    padding-top: 80px;
  }

  .role-section h3 {
    color: #2bf09f;
    margin-bottom: 25px;
    font-weight: 700;
  }

  .role-buttons a {
    margin: 10px;
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    display: inline-block;
    color: white;
    transition: transform 0.3s ease;
  }

  .role-buttons .student { background-color: #17c9ff; }
  .role-buttons .staff { background-color: #2bf09f; }
  .role-buttons .admin { background-color: #ff6363; }

  .role-buttons a:hover { transform: scale(1.1); }

  .login-container {
    display: none;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    animation: fadeIn 0.6s ease forwards;
  }

  .fade-in-restart {
    animation: fadeIn 0.6s ease forwards !important;
  }

  .login-box {
    background-color: #1a1a1a;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 255, 150, 0.1);
    max-width: 400px;
    width: 90%;
    z-index: 2;
  }

  .login-box h2 {
    color: #2bf09f;
    text-align: center;
    margin-bottom: 25px;
  }

  .input-group {
    margin-bottom: 15px;
  }

  .input-group-text {
    background-color: #e9ecef;
    border: none;
    border-radius: 10px 0 0 10px;
  }

  .form-control {
    border-radius: 0 10px 10px 0;
    height: 44px;
  }

  .btn-login {
    background-color: #2bf09f;
    color: black;
    font-weight: 600;
    width: 100%;
    border-radius: 25px;
    padding: 10px 0;
    margin-top: 10px;
    transition: 0.3s;
  }

  .btn-login:hover { background-color: #21e6a3; }

  .signup-link {
    margin-top: 12px;
    text-align: center;
    font-size: 14px;
  }

  .signup-link a {
    color: #2bf09f;
    text-decoration: none;
    font-weight: 500;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 576px) {
    .login-box { margin: 0 20px; }
  }
</style>

<div class="image-side"></div>

<div class="container role-section" data-aos="fade-down">
  <h3>Select Your Role</h3>
  <div class="role-buttons">
    <a href="#" class="student" onclick="showLoginBox('Student')">Student</a>
    <a href="#" class="staff" onclick="showLoginBox('Staff')">Staff</a>
    <a href="#" class="admin" onclick="showLoginBox('Admin')">Admin</a>
  </div>
</div>

<div class="container login-container" id="login-box">
  <div class="login-box" data-aos="zoom-in">
    <h2 id="login-title">Login</h2>
    <form method="POST" novalidate>
      {% csrf_token %}
      <input type="hidden" name="role" id="roleInput">

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        {{ form.username }}
      </div>

      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        {{ form.password }}
      </div>

      <button type="submit" class="btn btn-login">Login</button>

      <div class="signup-link mt-3">
        Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
      </div>
    </form>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

<script>
  function showLoginBox(role) {
    const loginContainer = document.getElementById('login-box');
    const loginTitle = document.getElementById('login-title');
    const roleInput = document.getElementById('roleInput');

    loginTitle.innerText = role + " Login";
    roleInput.value = role.toLowerCase(); // store role for server

    loginContainer.style.display = 'flex';
    loginContainer.classList.remove('fade-in-restart');
    void loginContainer.offsetWidth;
    loginContainer.classList.add('fade-in-restart');
  }
</script>
{% endblock %}
