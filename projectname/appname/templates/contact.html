{% extends 'base.html' %}
{% load static %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #0d1117;
    overflow-x: hidden;
  }

  .contact-section {
    background-image: url("{% static 'images/contact.jpeg' %}");
    background-size: cover;
    background-position: center;
    padding: 80px 0;
    position: relative;
  }

  .contact-section::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    z-index: 0;
  }

  .contact-content {
    position: relative;
    z-index: 1;
  }

  .btn-neon {
    background-color: transparent;
    color: #000;
    border: 2px solid #000;
    margin: 10px;
    transition: 0.3s;
  }

  .btn-neon:hover, .btn-neon.active {
    background-color: #000;
    color: #fff;
    box-shadow: 0 0 10px #000;
  }

  .form-box {
    background-color: rgba(0, 0, 0, 0);
    backdrop-filter: blur(1px);
    padding: 25px 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 450px;
    text-align: left;
  }

  .form-label, .form-control::placeholder {
    color: #000;
  }

  .form-control {
    background: transparent;
    border: none;
    border-bottom: 2px solid #000;
    border-radius: 0;
    color: #000;
  }

  .form-control:focus {
    background: transparent;
    color: #000;
    box-shadow: none;
    border-bottom: 2px solid #000;
  }

  .neon-title {
    color: #111;
    font-weight: bold;
  }

  @media (min-width: 768px) {
    .form-container-wrapper {
      display: flex;
      justify-content: flex-end;
    }
  }

  .placeholder-white::placeholder {
    color: white !important;
    opacity: 0.8;
  }

  .placeholder-black::placeholder {
    color: white;
    opacity: 0.7;
  }

  .btn-neon {
    color: #fff;
    background: linear-gradient(90deg, #00f7ff, #007bff);
    border: none;
    padding: 10px 25px;
    font-weight: bold;
    border-radius: 50px;
    transition: all 0.3s ease;
  }

  .btn-neon:hover {
    box-shadow: 0 0 10px #00f7ff, 0 0 20px #007bff;
    transform: translateY(-2px);
  }
</style>

<section class="contact-section" data-aos="fade-up">
  <div class="container contact-content text-center">
    
    {% if user.is_superuser %}
    <div class="d-flex justify-content-end pe-3 mt-2">
      <a href="{% url 'messages' %}" class="btn btn-outline-light btn-sm" style="font-weight: 500;">
        <i class="bi bi-eye me-1"></i> View Messages
      </a>
    </div>
    {% endif %}
    
    <div class="form-container-wrapper">
      <div class="text-center mb-3">
        <button id="btnContactForm" class="btn btn-neon active">Contact Me</button>
        <button id="btnSMSForm" class="btn btn-neon">Send via SMS & Email</button>
      </div>

      <div id="formContainer" class="form-box ms-auto">
        <h4 class="text-center text-white fw-bold mb-4 get-in-touch-title">Get in Touch</h4>

        {% if messages %}
        <div class="container my-2">
          {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        </div>
        {% endif %}

        <form id="contactForm" method="post" action="{% url 'contact' %}">
          {% csrf_token %}

          <div class="mb-3">
            <label for="name" class="form-label text-white">
              <i class="bi bi-person me-2"></i>Your Name
            </label>
            <input type="text"
                   class="form-control border-0 border-bottom border-white bg-transparent text-white placeholder-black"
                   id="name" name="name" required placeholder="Enter your name">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label text-white">
              <i class="bi bi-envelope me-2"></i>Your Email
            </label>
            <input type="email"
                   class="form-control border-0 border-bottom border-white bg-transparent text-white placeholder-black"
                   id="email" name="email" required placeholder="Enter your email">
          </div>

          <div class="mb-3">
            <label for="message" class="form-label text-white">
              <i class="bi bi-pencil me-2"></i>Message
            </label>
            <textarea
              class="form-control border-0 border-bottom border-white bg-transparent text-white placeholder-black"
              id="message" name="message" rows="3" required placeholder="Type your message..."></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-neon" id="sendBtn">
              <span id="sendText">Send Message</span>
              <span id="successTick" style="display:none;">✅ Sent</span>
            </button>
          </div>
        </form>

        <form id="smsForm" method="post" action="{% url 'send_sms_and_email' %}" style="display:none;">
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_recipient_email" class="form-label text-white"> Email</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-0 text-white">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" name="recipient_email" id="id_recipient_email"
                     class="form-control border-0 border-bottom bg-transparent text-white placeholder-black"
                     placeholder="Enter email" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="id_recipient_phone" class="form-label text-white"> Phone</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-0 text-white">
                <i class="bi bi-telephone"></i>
              </span>
              <input type="text" name="recipient_phone" id="id_recipient_phone"
                     class="form-control border-0 border-bottom bg-transparent text-white placeholder-black"
                     placeholder="Enter phone number" maxlength="15" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="id_message" class="form-label text-white">Message</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-0 text-white">
                <i class="bi bi-chat-dots"></i>
              </span>
              <textarea name="message" id="id_message" rows="3"
                        class="form-control border-0 border-bottom bg-transparent text-white placeholder-black"
                        placeholder="Enter message..." required></textarea>
            </div>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-neon">Send Now <i class="bi bi-send ms-1"></i></button>
          </div>
        </form>

      </div>
    </div>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

<script>
  const btnContactForm = document.getElementById('btnContactForm');
  const btnSMSForm = document.getElementById('btnSMSForm');
  const contactForm = document.getElementById('contactForm');
  const smsForm = document.getElementById('smsForm');
  const sendBtn = document.getElementById('sendBtn');
  const sendText = document.getElementById('sendText');
  const successTick = document.getElementById('successTick');

  btnContactForm.addEventListener('click', function () {
    contactForm.style.display = 'block';
    smsForm.style.display = 'none';
    btnContactForm.classList.add('active');
    btnSMSForm.classList.remove('active');
  });

  btnSMSForm.addEventListener('click', function () {
    contactForm.style.display = 'none';
    smsForm.style.display = 'block';
    btnSMSForm.classList.add('active');
    btnContactForm.classList.remove('active');
  });

  if (sendBtn && sendText && successTick) {
    contactForm.addEventListener('submit', function () {
      sendBtn.disabled = true;
      sendText.style.display = 'none';
      successTick.style.display = 'inline';
    });
  }
</script>

{% endblock %}
