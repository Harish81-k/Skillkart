{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #000;
    color: white;
  }

  .signup-container {
    max-width: 600px;
    margin: 50px auto;
    background: #111;
    padding: 30px 40px;
    border-radius: 16px;
    box-shadow: 0 0 20px #2bf09f22;
    border: 1px solid #2bf09f44;
    animation: fadeSlide 0.6s ease;
  }

  .signup-container h2 {
    color: #2bf09f;
    text-align: center;
    margin-bottom: 30px;
    font-weight: 600;
  }

  .form-control {
    background-color: #1a1a1a;
    color: white;
    border: 1px solid #2bf09f33;
  }

  .form-control:focus {
    border-color: #2bf09f;
    box-shadow: 0 0 8px #2bf09f55;
  }

  .btn-submit {
    background-color: #2bf09f;
    color: black;
    font-weight: 600;
    border: none;
    width: 100%;
    transition: 0.3s ease;
  }

  .btn-submit:hover {
    background-color: #1dd78a;
    transform: translateY(-2px);
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="signup-container">
  <h2>Staff Signup</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
  {{ form.full_name.label_tag }}
  {{ form.full_name }}
</div>

    <div class="mb-3">
      {{ form.username.label_tag }}
      {{ form.username }}
    </div>

    <div class="mb-3">
      {{ form.email.label_tag }}
      {{ form.email }}
    </div>

    <div class="mb-3">
      {{ form.password.label_tag }}
      {{ form.password }}
    </div>

    <div class="mb-3">
      <label for="id_department">Department</label>
      <input type="text" name="department" id="id_department" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-submit mt-3">Sign Up</button>
  </form>
</div>
{% endblock %}
